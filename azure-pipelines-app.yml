trigger:
  branches:
    include: [main]
  paths:
    include: [src/*]

variables:
- name: vmImageName
  value: 'ubuntu-latest'
- name: azureSubscription
  value: 'Azure-StayHere-Conn'
- name: buildConfiguration
  value: 'Release'
- name: dotnetVersion
  value: '9.x'
- group: StayHere-Variables

stages:
- stage: Build
  displayName: 'Build and Package'
  jobs:
  - job: Build
    pool:
      vmImage: $(vmImageName)
    steps:
    - task: UseDotNet@2
      inputs:
        version: $(dotnetVersion)

    - task: DotNetCoreCLI@2
      displayName: 'Restore Solution'
      inputs:
        command: 'restore'
        projects: 'StayHere.sln'

    - script: dotnet build StayHere.sln --configuration $(buildConfiguration) --no-restore
      displayName: 'Build Solution'

    - task: DotNetCoreCLI@2
      displayName: 'Publish AuthService'
      inputs:
        command: 'publish'
        publishWebProjects: false
        projects: 'src/FunctionApps/AuthService/StayHere.AuthService.csproj'
        arguments: '--configuration $(buildConfiguration) --output $(Build.ArtifactStagingDirectory)/AuthService'
        zipAfterPublish: true

    - task: DotNetCoreCLI@2
      displayName: 'Publish PropertyService'
      inputs:
        command: 'publish'
        publishWebProjects: false
        projects: 'src/FunctionApps/PropertyService/StayHere.PropertyService.csproj'
        arguments: '--configuration $(buildConfiguration) --output $(Build.ArtifactStagingDirectory)/PropertyService'
        zipAfterPublish: true

    - task: DotNetCoreCLI@2
      displayName: 'Publish CustomerService'
      inputs:
        command: 'publish'
        publishWebProjects: false
        projects: 'src/FunctionApps/CustomerService/StayHere.CustomerService.csproj'
        arguments: '--configuration $(buildConfiguration) --output $(Build.ArtifactStagingDirectory)/CustomerService'
        zipAfterPublish: true

    - task: DotNetCoreCLI@2
      displayName: 'Publish PropertyOwnerService'
      inputs:
        command: 'publish'
        publishWebProjects: false
        projects: 'src/FunctionApps/PropertyOwnerService/StayHere.PropertyOwnerService.csproj'
        arguments: '--configuration $(buildConfiguration) --output $(Build.ArtifactStagingDirectory)/PropertyOwnerService'
        zipAfterPublish: true

    - task: DotNetCoreCLI@2
      displayName: 'Publish StaticDataService'
      inputs:
        command: 'publish'
        publishWebProjects: false
        projects: 'src/FunctionApps/StaticDataService/StayHere.StaticDataService.csproj'
        arguments: '--configuration $(buildConfiguration) --output $(Build.ArtifactStagingDirectory)/StaticDataService'
        zipAfterPublish: true

    - publish: $(Build.ArtifactStagingDirectory)/AuthService
      artifact: AuthService_Pkg
    - publish: $(Build.ArtifactStagingDirectory)/PropertyService
      artifact: PropertyService_Pkg
    - publish: $(Build.ArtifactStagingDirectory)/CustomerService
      artifact: CustomerService_Pkg
    - publish: $(Build.ArtifactStagingDirectory)/PropertyOwnerService
      artifact: PropertyOwnerService_Pkg
    - publish: $(Build.ArtifactStagingDirectory)/StaticDataService
      artifact: StaticDataService_Pkg

- stage: Migrate_Database
  displayName: 'Migrate Database'
  dependsOn: Build
  condition: succeeded()
  jobs:
  - job: Migrate
    pool:
      vmImage: $(vmImageName)
    steps:
    - task: UseDotNet@2
      inputs:
        version: $(dotnetVersion)

    - task: DotNetCoreCLI@2
      displayName: 'Restore Infrastructure Project'
      inputs:
        command: 'restore'
        projects: 'src/Infrastructure/StayHere.Infrastructure.csproj'

    - script: dotnet build src/Infrastructure/StayHere.Infrastructure.csproj --configuration $(buildConfiguration)
      displayName: 'Build Infrastructure'

    - script: dotnet tool install --global dotnet-ef
      displayName: 'Install dotnet-ef'

    - script: |
        dotnet ef database update \
          --project src/Infrastructure \
          --startup-project src/Infrastructure \
          --verbose
      displayName: 'Run EF Migrations'
      env:
        DB_HOST: $(DB_HOST)
        DB_PORT: $(DB_PORT)
        DB_NAME: $(DB_NAME)
        DB_USER: $(DB_USER)
        DB_PASSWORD: $(DB_PASSWORD)

- stage: Deploy_AuthService
  displayName: 'Deploy Auth'
  dependsOn: Migrate_Database
  condition: succeeded()
  jobs:
  - job: Deploy
    pool:
      vmImage: $(vmImageName)
    steps:
    - download: current
      artifact: AuthService_Pkg
    - task: AzureCLI@2
      displayName: 'Discover Function App Name'
      inputs:
        azureSubscription: $(azureSubscription)
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          echo "Current Subscription Context:"
          az account show --query "{subscription:name, id:id, tenant:tenantId}" -o table
          
          echo "Audit: Listing all Function Apps in this subscription..."
          az functionapp list --query "[].{Name:name, Tags:tags}" -o table
          
          echo "Searching for Function App with Service=AuthService tag..."
          APP_NAME=$(az functionapp list --query "[?tags.Service=='AuthService'].name" -o tsv | head -n 1)
          
          if [ -z "$APP_NAME" ]; then
            echo "Tag not found. Searching by name pattern 'func-dev-auth'..."
            APP_NAME=$(az functionapp list --query "[?contains(name, 'func-dev-auth')].name" -o tsv | head -n 1)
          fi
          
          if [ -z "$APP_NAME" ]; then
            echo "##vso[task.logissue type=error]Could not find Function App for AuthService. List above shows Available resources."
            exit 1
          fi
          
          echo "Successfully Found: $APP_NAME"
          echo "##vso[task.setvariable variable=DynamicAppName]$APP_NAME"
    - task: AzureFunctionApp@2
      displayName: 'Deploy to Azure'
      inputs:
        azureSubscription: $(azureSubscription)
        appType: 'functionAppLinux'
        appName: $(DynamicAppName)
        package: '$(Pipeline.Workspace)/AuthService_Pkg/**/*.zip'

- stage: Deploy_PropertyService
  displayName: 'Deploy Property'
  dependsOn: Migrate_Database
  condition: succeeded()
  jobs:
  - job: Deploy
    pool:
      vmImage: $(vmImageName)
    steps:
    - download: current
      artifact: PropertyService_Pkg
    - task: AzureCLI@2
      displayName: 'Discover Function App Name'
      inputs:
        azureSubscription: $(azureSubscription)
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          APP_NAME=$(az functionapp list --query "[?tags.Service=='PropertyService'].name" -o tsv | head -n 1)
          if [ -z "$APP_NAME" ]; then
            APP_NAME=$(az functionapp list --query "[?contains(name, 'func-dev-property')].name" -o tsv | head -n 1)
          fi
          if [ -z "$APP_NAME" ]; then echo "PropertyService not found"; exit 1; fi
          echo "Found: $APP_NAME"
          echo "##vso[task.setvariable variable=DynamicAppName]$APP_NAME"
    - task: AzureFunctionApp@2
      displayName: 'Deploy to Azure'
      inputs:
        azureSubscription: $(azureSubscription)
        appType: 'functionAppLinux'
        appName: $(DynamicAppName)
        package: '$(Pipeline.Workspace)/PropertyService_Pkg/**/*.zip'

