trigger:
  branches:
    include: [main]
  paths:
    include: [infrastructure/terraform/*]

variables:
- group: StayHere-Variables

stages:
- stage: TerraformPlan
  jobs:
  - job: Plan
    pool: { vmImage: 'ubuntu-latest' }
    timeoutInMinutes: 60
    steps:
    - task: TerraformInstaller@1
      displayName: 'Install Latest Terraform'
      inputs:
        terraformVersion: 'latest'

    - task: TerraformTask@5
      displayName: 'Terraform Init'
      inputs:
        provider: 'azurerm'
        command: 'init'
        workingDirectory: '$(System.DefaultWorkingDirectory)/infrastructure/terraform'
        backendServiceArm: 'Azure-StayHere-Conn'
        backendAzureRmResourceGroupName: 'rg-terraform-mgmt'
        backendAzureRmStorageAccountName: 'ststayheretfstate'
        backendAzureRmContainerName: 'tfstate'
        backendAzureRmKey: 'terraform.tfstate'

    - task: TerraformTask@5
      name: terraformPlan
      displayName: 'Terraform Plan'
      inputs:
        provider: 'azurerm'
        command: 'plan'
        workingDirectory: '$(System.DefaultWorkingDirectory)/infrastructure/terraform'
        commandOptions: >-
          -out tfplan
          -var="mongodb_atlas_public_key=$(MONGODB_ATLAS_PUBLIC_KEY)"
          -var="mongodb_atlas_private_key=$(MONGODB_ATLAS_PRIVATE_KEY)"
          -var="mongodb_atlas_org_id=$(MONGODB_ATLAS_ORG_ID)"
          -var="skip_auth=$(SKIP_AUTH)"
          -var="openrouter_api_key=$(OPENROUTER_API_KEY)"
          -var="openrouter_model=$(OPENROUTER_MODEL)"
          -var="openrouter_embedding_model=$(OPENROUTER_EMBEDDING_MODEL)"
        environmentServiceNameAzureRM: 'Azure-StayHere-Conn'

    - task: PublishPipelineArtifact@1
      displayName: 'Publish Terraform Plan'
      inputs:
        targetPath: '$(System.DefaultWorkingDirectory)/infrastructure/terraform/tfplan'
        artifact: 'terraform-plan'
        publishLocation: 'pipeline'

- stage: TerraformApply
  dependsOn: TerraformPlan
  condition: and(succeeded('TerraformPlan'), eq(dependencies.TerraformPlan.outputs['Plan.terraformPlan.changesPresent'], 'true'))
  jobs:
  - deployment: Apply
    pool: { vmImage: 'ubuntu-latest' }
    environment: 'production'
    timeoutInMinutes: 120
    strategy:
      runOnce:
        deploy:
          steps:
          - checkout: self

          - task: TerraformInstaller@1
            displayName: 'Install Latest Terraform'
            inputs:
              terraformVersion: 'latest'

          - task: TerraformTask@5
            displayName: 'Terraform Init'
            inputs:
              provider: 'azurerm'
              command: 'init'
              workingDirectory: '$(System.DefaultWorkingDirectory)/infrastructure/terraform'
              backendServiceArm: 'Azure-StayHere-Conn'
              backendAzureRmResourceGroupName: 'rg-terraform-mgmt'
              backendAzureRmStorageAccountName: 'ststayheretfstate'
              backendAzureRmContainerName: 'tfstate'
              backendAzureRmKey: 'terraform.tfstate'

          - task: DownloadPipelineArtifact@2
            displayName: 'Download Terraform Plan'
            inputs:
              buildType: 'current'
              artifactName: 'terraform-plan'
              targetPath: '$(System.DefaultWorkingDirectory)/infrastructure/terraform'

          - task: TerraformTask@5
            displayName: 'Terraform Apply'
            inputs:
              provider: 'azurerm'
              command: 'apply'
              workingDirectory: '$(System.DefaultWorkingDirectory)/infrastructure/terraform'
              commandOptions: 'tfplan'
              environmentServiceNameAzureRM: 'Azure-StayHere-Conn'